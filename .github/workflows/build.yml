# File: .github/workflows/build.yml
name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true
        type: string

      tag:
        description: "Tag build"
        required: true
        type: string

      build_type:
        description: "debug / release"
        required: true
        default: "release"
        type: string

      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      # =========================
      # CHECKOUT REPO (opsional untuk akses ke file repo)
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # NODE.JS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # =========================
      # DOWNLOAD ZIP
      # =========================
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          # Gunakan `-L` untuk follow redirects, `-f` untuk gagal pada HTTP error
          # Tambahkan timeout dan retry
          curl -L -f --max-time 120 --retry 3 \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n=== Final URL: %{url_effective} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip

          # Verifikasi file adalah ZIP yang valid
          if ! file project.zip | grep -q "Zip archive data"; then
            echo "❌ File yang diunduh bukan ZIP archive yang valid!"
            exit 1
          fi

      # =========================
      # EXTRACT ZIP
      # =========================
      - name: Extract ZIP
        run: |
          echo "=== Extracting ZIP ==="
          # Ekstrak ke folder 'project'
          unzip -q project.zip -d project
          echo "=== Isi folder project (awal) ==="
          find project -maxdepth 2 | head -50

          # Cari root project Flutter (tempat pubspec.yaml berada)
          PUBSPEC_PATH=$(find project -name "pubspec.yaml" -print -quit)
          if [ -n "$PUBSPEC_PATH" ]; then
            PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
            echo "✅ pubspec.yaml ditemukan di: $PROJECT_DIR"
          else
            # Jika tidak ada pubspec.yaml, coba cari folder yang mengandung gradlew
            GRADLEW_PATH=$(find project -name "gradlew" -print -quit)
            if [ -n "$GRADLEW_PATH" ]; then
              PROJECT_DIR=$(dirname "$GRADLEW_PATH")
              echo "⚠️ pubspec.yaml tidak ditemukan, menggunakan root project Gradle: $PROJECT_DIR"
            else
              # Fallback: gunakan folder pertama atau root
              SUB_DIR_COUNT=$(find project -maxdepth 1 -mindepth 1 -type d | wc -l)
              FILE_COUNT=$(find project -maxdepth 1 -mindepth 1 -type f | wc -l)
              if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
                PROJECT_DIR=$(find project -maxdepth 1 -mindepth 1 -type d | head -n 1)
              else
                PROJECT_DIR="project"
              fi
            fi
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "=== Project root: $PROJECT_DIR ==="
          ls -la "$PROJECT_DIR" | head -20

      # =========================
      # JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # FLUTTER
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"

      # ==========================================================
      # 🔍 TAHAP ANALYZE
      # ==========================================================
      - name: Analyze Project Code (Flutter Only)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Starting Automated Code Analysis ==="
          if [ -f "pubspec.yaml" ]; then
            echo "🔍 Menjalankan flutter analyze..."
            # Jalankan analyze dengan timeout
            timeout 60s flutter analyze > analyze_report.txt 2>&1 || true
            echo "[RESULT_ANALYZE]"
            cat analyze_report.txt
            echo "[END_RESULT_ANALYZE]"
          else
            echo "☕ Bukan project Flutter, skip analyze."
          fi

      - name: Stop if Analyze Only
        if: github.event.inputs.only_analyze == 'true'
        run: |
          echo "✅ Analyze-only mode selesai. Workflow dihentikan."

      # =========================
      # FLUTTER DOCTOR (hanya jika tidak analyze-only)
      # =========================
      - name: Flutter Doctor
        if: github.event.inputs.only_analyze != 'true'
        run: flutter doctor

      # ==========================================================
      # 📦 TAHAP DEPENDENSI
      # ==========================================================
      - name: Get dependencies
        if: github.event.inputs.only_analyze != 'true'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Menjalankan flutter pub get ==="
          if [ -f "pubspec.yaml" ]; then
            flutter pub get || {
              echo "⚠️ Gagal download dependencies. Periksa pubspec.yaml."
              exit 1
            }
          else
            echo "☕ Bukan project Flutter, skip pub get!"
          fi

      # ==========================================================
      # 🚀 TAHAP BUILD
      # ==========================================================
      - name: Build APK
        if: github.event.inputs.only_analyze != 'true'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK ==="
          echo "Mode: ${{ github.event.inputs.build_type }}"

          if [ -f "pubspec.yaml" ]; then
            echo "🔥 Project Flutter Terdeteksi! Kompilasi via Flutter SDK..."
            flutter build apk --${{ github.event.inputs.build_type }} || {
              echo "❌ Build APK gagal!"
              exit 1
            }
          else
            echo "☕ Project Native Android Terdeteksi! Bypassing Flutter Core..."
            GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
            if [ -z "$GRADLEW_PATH" ]; then
              echo "❌ ERROR: File 'gradlew' tidak ditemukan!"
              exit 1
            fi
            GRADLE_DIR=$(dirname "$GRADLEW_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew

            echo "🚀 Membakar APK menggunakan Gradle Native..."
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug || {
                echo "❌ Gradle build debug gagal!"
                exit 1
              }
            else
              ./gradlew assembleRelease || {
                echo "❌ Gradle build release gagal!"
                exit 1
              }
            fi
            cd -
          fi

      # =========================
      # CHECK APK
      # =========================
      - name: Check APK Output
        if: github.event.inputs.only_analyze != 'true'
        run: |
          echo "=== APK Output Scanning (Global Mode) ==="
          echo "Mencari file APK di seluruh direktori..."
          find $GITHUB_WORKSPACE -name "*.apk"

          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | head -n 1)
          if [ -z "$APK_FOUND" ]; then
            echo "❌ Error: Tidak ditemukan file APK hasil build."
            exit 1
          fi

          echo "✅ APK Sukses Ditemukan di: $APK_FOUND"
          APK_PATH=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

          echo ""
          echo "=== APK Size ==="
          ls -lh "$APK_FOUND"

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload APK artifact
        if: github.event.inputs.only_analyze != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.APK_PATH }}
          retention-days: 7
          if-no-files-found: error
