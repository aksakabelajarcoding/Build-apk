name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true
      tag:
        description: "Tag build untuk identifikasi"
        required: true
      build_type:
        description: "release / debug"
        required: false
        default: "release"
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # =========================
      # SETUP NODE.JS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # =========================
      # DOWNLOAD ZIP
      # =========================
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip

      # =========================
      # VALIDASI & EXTRACT ZIP
      # =========================
      - name: Validate and Extract ZIP
        run: |
          echo "=== Validating ZIP ==="

          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            exit 1
          fi

          echo "✅ ZIP valid"

          echo ""
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo ""
          echo "=== Menentukan Project Root ==="
          
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      # =========================
      # CEK PUBSPEC.YAML
      # =========================
      - name: Check pubspec.yaml
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml TIDAK DITEMUKAN!"
            exit 1
          fi
          echo "✅ pubspec.yaml ditemukan"

      # =========================
      # SETUP JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # SETUP FLUTTER
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
          cache: true

      # =========================
      # FLUTTER DOCTOR
      # =========================
      - name: Flutter Doctor
        run: flutter doctor

      # ==========================================================
      # 🔍 ANALYZE PROJECT
      # ==========================================================
      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        continue-on-error: true
        run: |
          echo "=== Running flutter analyze ==="
          flutter analyze || true

      # ==========================================================
      # 🛑 STOP IF ANALYZE ONLY
      # ==========================================================
      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: |
          echo "✅ Analyze-only mode selesai."
          exit 0

      # ==========================================================
      # 📦 INSTALL DEPENDENCIES
      # ==========================================================
      - name: Install Dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Installing dependencies ==="
          flutter pub get

      # ==========================================================
      # 🚀 BUILD APK
      # ==========================================================
      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK ==="
          echo "Mode: ${{ github.event.inputs.build_type }}"
          
          flutter build apk --${{ github.event.inputs.build_type }}

      # =========================
      # FIND APK
      # =========================
      - name: Find APK
        id: find_apk
        run: |
          echo "=== Searching for APK ==="
          
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" -type f | head -n 1)
          
          if [ -z "$APK_FOUND" ]; then
            echo "❌ APK tidak ditemukan!"
            exit 1
          fi
          
          echo "✅ APK ditemukan: $APK_FOUND"
          echo "APK_PATH=$APK_FOUND" >> $GITHUB_ENV

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.APK_PATH }}
          retention-days: 3
          if-no-files-found: error
