name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true
        type: string

      tag:
        description: "Tag build"
        required: true
        type: string

      build_type:
        description: "debug / release"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
        
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:

      # =========================
      # CLEAN WORKSPACE
      # =========================
      - name: Clean workspace
        run: |
          rm -rf $GITHUB_WORKSPACE/* || true
          rm -rf $GITHUB_WORKSPACE/.* || true

      # =========================
      # CHECKOUT REPO
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # NODE.JS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # =========================
      # DOWNLOAD ZIP
      # =========================
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          curl -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip

      # =========================
      # VALIDASI & EKSTRAK ZIP
      # =========================
      - name: Extract ZIP
        run: |
          echo "=== Extracting ZIP ==="
          
          # Coba unzip dengan force
          unzip -o -q project.zip -d project_raw || {
            echo "❌ Failed to unzip! Trying with different method..."
            # Coba dengan 7z
            sudo apt-get install -y p7zip-full
            7z x project.zip -oproject_raw || {
              echo "❌ Both unzip and 7z failed!"
              exit 1
            }
          }

          echo ""
          echo "=== Isi folder project_raw ==="
          ls -la project_raw/

          echo ""
          echo "=== Detecting Project Root ==="
          
          # Cari pubspec.yaml
          PUBSPEC_PATH=$(find project_raw -name "pubspec.yaml" -type f | head -n 1)
          
          if [ -n "$PUBSPEC_PATH" ]; then
            PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
            echo "✅ Found pubspec.yaml in: $PROJECT_DIR"
          else
            # Cek apakah ada subfolder tunggal
            SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
            if [ "$SUB_DIR_COUNT" -eq 1 ]; then
              PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
              echo "✅ Single root folder: $PROJECT_DIR"
            else
              PROJECT_DIR="project_raw"
              echo "✅ Using project_raw"
            fi
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

          echo ""
          echo "=== Project structure ==="
          ls -la $PROJECT_DIR/

      # =========================
      # JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # FLUTTER
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"
          cache: true

      # =========================
      # FLUTTER DOCTOR (INFO)
      # =========================
      - name: Flutter Doctor
        run: flutter doctor

      # ==========================================================
      # 🔍 TAHAP ANALYZE
      # ==========================================================
      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Starting Automated Code Analysis ==="

          if [ -f "pubspec.yaml" ]; then
            echo "🔍 Running flutter analyze..."
            flutter pub get || echo "⚠️ pub get warning, continuing..."
            flutter analyze || echo "⚠️ analyze warnings found"
          else
            echo "☕ Project native / gradlew detected!"
            echo "⚠️ Analyze only works for Flutter projects"
          fi

      # ==========================================================
      # 🔍 STOP JIKA ONLY_ANALYZE = TRUE
      # ==========================================================
      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: |
          echo "✅ Analyze-only mode completed. Workflow stopped."
          exit 0

      # ==========================================================
      # 📦 TAHAP DOWNLOAD DEPENDENSI
      # ==========================================================
      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Running flutter pub get ==="
          if [ -f "pubspec.yaml" ]; then
            flutter pub get --no-example
          else
            echo "☕ Not a Flutter project, skipping pub get!"
          fi

      # ==========================================================
      # 🚀 TAHAP BUILD APK
      # ==========================================================
      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK ==="
          echo "Mode: ${{ github.event.inputs.build_type }}"

          if [ -f "pubspec.yaml" ]; then
            echo "🔥 Flutter Project Detected!"
            
            # Clean dulu
            flutter clean || true
            
            # Build dengan verbose agar error keliatan
            flutter build apk --${{ github.event.inputs.build_type }} --verbose
            
          else
            echo "☕ Native Android Project Detected!"
            GRADLE_PATH=$(find . -name "gradlew" -type f | head -n 1)
            
            if [ -z "$GRADLE_PATH" ]; then
              echo "❌ ERROR: 'gradlew' not found!"
              exit 1
            fi
            
            GRADLE_DIR=$(dirname "$GRADLE_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew
            
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug --stacktrace
            else
              ./gradlew assembleRelease --stacktrace
            fi
            cd -
          fi

      # =========================
      # FIND APK & SET PATH
      # =========================
      - name: Find APK
        id: find_apk
        run: |
          echo "=== Scanning for APK files ==="
          
          # Cari APK di project directory
          APK_PATH=$(find ${{ env.PROJECT_DIR }} -name "*.apk" -type f | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found!"
            echo ""
            echo "=== Build output directory ==="
            find ${{ env.PROJECT_DIR }} -type d -name "build" -exec ls -la {} \;
            echo ""
            echo "=== All files ==="
            find ${{ env.PROJECT_DIR }} -type f | grep -E "\.(apk|aab|json|txt)$"
            exit 1
          fi
          
          echo "✅ APK found: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          
          echo "=== APK Info ==="
          ls -lh "$APK_PATH"
          file "$APK_PATH"

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.APK_PATH }}
          retention-days: 7
          if-no-files-found: error
