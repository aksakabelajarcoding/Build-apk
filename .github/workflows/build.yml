name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter (dari GitHub Release)"
        required: true
      tag:
        description: "Tag build untuk identifikasi"
        required: true
      build_type:
        description: "debug / release"
        required: false
        default: "release"
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # =========================
      # SETUP NODE.JS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # =========================
      # DOWNLOAD ZIP
      # =========================
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip

      # =========================
      # VALIDASI & EXTRACT ZIP
      # =========================
      - name: Validate and Extract ZIP
        run: |
          echo "=== Validating ZIP ==="

          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            echo ""
            echo "=== Isi 20 baris pertama file ==="
            head -20 project.zip
            exit 1
          fi

          echo "✅ ZIP valid"

          echo ""
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo ""
          echo "=== Isi folder project_raw ==="
          find project_raw -maxdepth 2 | head -30

          echo ""
          echo "=== Menentukan Project Root ==="
          
          # Deteksi struktur: apakah ada 1 folder pembungkus?
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
            echo "✅ Project root: $PROJECT_DIR"
          else
            PROJECT_DIR="project_raw"
            echo "✅ Project root: $PROJECT_DIR"
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      # =========================
      # SETUP JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # SETUP FLUTTER
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
          cache: true

      # ==========================================================
      # 🔍 ANALYZE PROJECT
      # ==========================================================
      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Starting Automated Code Analysis ==="

          if [ -f "pubspec.yaml" ]; then
            echo "🔍 Menjalankan flutter analyze..."
            flutter analyze || true
          else
            echo "⚠️ pubspec.yaml tidak ditemukan, skip analyze"
          fi

      # ==========================================================
      # 🛑 STOP IF ANALYZE ONLY
      # ==========================================================
      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: |
          echo "✅ Analyze-only mode selesai. Workflow dihentikan."
          exit 0

      # =========================
      # FLUTTER DOCTOR
      # =========================
      - name: Flutter Doctor
        run: flutter doctor

      # ==========================================================
      # 📦 INSTALL DEPENDENCIES
      # ==========================================================
      - name: Install Dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Installing dependencies ==="
          
          if [ -f "pubspec.yaml" ]; then
            flutter pub get
          else
            echo "⚠️ pubspec.yaml tidak ditemukan, skip pub get"
          fi

      # ==========================================================
      # 🚀 BUILD APK
      # ==========================================================
      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK ==="
          echo "Mode: ${{ github.event.inputs.build_type }}"

          if [ -f "pubspec.yaml" ]; then
            echo "📱 Flutter project detected"
            flutter build apk --${{ github.event.inputs.build_type }}
          else
            echo "☕ Checking for Gradle project..."
            
            # Cari gradlew
            GRADLE_PATH=$(find . -name "gradlew" -type f | head -n 1)
            
            if [ -z "$GRADLE_PATH" ]; then
              echo "❌ ERROR: File 'gradlew' tidak ditemukan!"
              echo "Pastikan project adalah Flutter atau Android native yang valid."
              exit 1
            fi
            
            GRADLE_DIR=$(dirname "$GRADLE_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew
            
            echo "🚀 Building with Gradle..."
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug
            else
              ./gradlew assembleRelease
            fi
            cd -
          fi

      # =========================
      # FIND APK
      # =========================
      - name: Find APK
        id: find_apk
        run: |
          echo "=== Searching for APK ==="
          
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" -type f | head -n 1)
          
          if [ -z "$APK_FOUND" ]; then
            echo "❌ APK tidak ditemukan!"
            echo "Mencari semua file hasil build..."
            find $GITHUB_WORKSPACE -type f -name "*.apk" || true
            exit 1
          fi
          
          echo "✅ APK ditemukan: $APK_FOUND"
          echo "APK_PATH=$APK_FOUND" >> $GITHUB_ENV
          echo "APK_SIZE=$(du -h "$APK_FOUND" | cut -f1)" >> $GITHUB_ENV
          
          echo ""
          echo "=== APK Info ==="
          ls -lh "$APK_FOUND"

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.APK_PATH }}
          retention-days: 3
          if-no-files-found: error
