name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true
      tag:
        description: "Tag build untuk identifikasi"
        required: true
      build_type:
        description: "debug / release"
        required: false
        default: "release"
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # =========================
      # SETUP NODE.JS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # =========================
      # DOWNLOAD ZIP DENGAN DEBUG
      # =========================
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip
          
          echo ""
          echo "=== File Type ==="
          file project.zip
          
          echo ""
          echo "=== First 100 bytes ==="
          xxd project.zip | head -10

      # =========================
      # VALIDASI & EXTRACT ZIP
      # =========================
      - name: Validate and Extract ZIP
        run: |
          echo "=== Validating ZIP ==="

          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            echo ""
            echo "=== Isi 20 baris pertama file ==="
            head -20 project.zip
            exit 1
          fi

          echo "✅ ZIP valid"

          echo ""
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo ""
          echo "=== Isi folder project_raw ==="
          find project_raw -maxdepth 3 | head -50

          echo ""
          echo "=== Menentukan Project Root ==="
          
          # Deteksi struktur: apakah ada 1 folder pembungkus?
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
            echo "✅ Project root (1 folder pembungkus): $PROJECT_DIR"
          else
            PROJECT_DIR="project_raw"
            echo "✅ Project root (langsung): $PROJECT_DIR"
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          
          echo ""
          echo "=== Isi Project Root ==="
          ls -la "$PROJECT_DIR"

      # =========================
      # CEK PUBSPEC.YAML
      # =========================
      - name: Check pubspec.yaml
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Checking pubspec.yaml ==="
          
          if [ -f "pubspec.yaml" ]; then
            echo "✅ pubspec.yaml ditemukan!"
            echo ""
            echo "=== Isi pubspec.yaml ==="
            cat pubspec.yaml
          else
            echo "❌ pubspec.yaml TIDAK DITEMUKAN!"
            echo ""
            echo "Mencari file di project root:"
            ls -la
            echo ""
            echo "Mencari pubspec.yaml di seluruh folder:"
            find . -name "pubspec.yaml"
            exit 1
          fi

      # =========================
      # SETUP JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # SETUP FLUTTER
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
          cache: true

      # =========================
      # FLUTTER DOCTOR
      # =========================
      - name: Flutter Doctor
        run: flutter doctor -v

      # ==========================================================
      # 🔍 ANALYZE PROJECT
      # ==========================================================
      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        continue-on-error: true
        run: |
          echo "=== Starting Automated Code Analysis ==="
          
          flutter analyze || true
          
          echo ""
          echo "=== Check for specific issues ==="
          
          # Cek error umum
          if grep -r "import 'package:" . --include="*.dart" | grep -v "flutter/material" | grep -v "flutter/services" | head -20; then
            echo "⚠️ Ada import package yang mungkin bermasalah"
          fi
          
          # Cek MainActivity
          if [ -f "android/app/src/main/java/**/MainActivity.kt" ]; then
            echo "✅ MainActivity.kt ditemukan"
          elif [ -f "android/app/src/main/java/**/MainActivity.java" ]; then
            echo "✅ MainActivity.java ditemukan"
          else
            echo "⚠️ MainActivity tidak ditemukan!"
          fi

      # ==========================================================
      # 🛑 STOP IF ANALYZE ONLY
      # ==========================================================
      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: |
          echo "✅ Analyze-only mode selesai. Workflow dihentikan."
          exit 0

      # ==========================================================
      # 📦 INSTALL DEPENDENCIES DENGAN DEBUG
      # ==========================================================
      - name: Install Dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Installing dependencies ==="
          
          echo "Running flutter pub get..."
          flutter pub get
          
          echo ""
          echo "=== Check pubspec.lock ==="
          if [ -f "pubspec.lock" ]; then
            echo "✅ pubspec.lock created"
            cat pubspec.lock | head -30
          else
            echo "⚠️ pubspec.lock tidak dibuat!"
          fi

      # ==========================================================
      # 🚀 BUILD APK DENGAN DEBUG
      # ==========================================================
      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK ==="
          echo "Mode: ${{ github.event.inputs.build_type }}"
          echo "Current directory: $(pwd)"
          echo ""
          
          echo "=== Flutter version ==="
          flutter --version
          
          echo ""
          echo "=== Build command ==="
          echo "flutter build apk --${{ github.event.inputs.build_type }}"
          
          # Jalankan build dengan output verbose
          flutter build apk --${{ github.event.inputs.build_type }} -v

      # =========================
      # FIND APK DENGAN DEBUG
      # =========================
      - name: Find APK
        id: find_apk
        run: |
          echo "=== Searching for APK ==="
          
          echo "Mencari di seluruh workspace:"
          find $GITHUB_WORKSPACE -name "*.apk" -type f 2>/dev/null || echo "Tidak ada APK ditemukan"
          
          echo ""
          echo "Mencari di folder build:"
          find $GITHUB_WORKSPACE -path "*/build/app/outputs/flutter-apk/*.apk" -type f 2>/dev/null || echo "Tidak ada APK di build/app/outputs"
          
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" -type f | head -n 1)
          
          if [ -z "$APK_FOUND" ]; then
            echo "❌ APK tidak ditemukan!"
            echo ""
            echo "=== Isi folder build ==="
            find $GITHUB_WORKSPACE -name "build" -type d -exec ls -la {} \; 2>/dev/null || echo "Folder build tidak ditemukan"
            exit 1
          fi
          
          echo "✅ APK ditemukan: $APK_FOUND"
          echo "APK_PATH=$APK_FOUND" >> $GITHUB_ENV
          echo "APK_SIZE=$(du -h "$APK_FOUND" | cut -f1)" >> $GITHUB_ENV
          
          echo ""
          echo "=== APK Info ==="
          ls -lh "$APK_FOUND"

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.APK_PATH }}
          retention-days: 3
          if-no-files-found: error
