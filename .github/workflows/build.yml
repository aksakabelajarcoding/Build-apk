name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true
        type: string

      tag:
        description: "Tag build"
        required: true
        type: string

      build_type:
        description: "debug / release"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
        
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:

      # =========================
      # CLEAN WORKSPACE
      # =========================
      - name: Clean workspace
        run: |
          rm -rf $GITHUB_WORKSPACE/* || true
          rm -rf $GITHUB_WORKSPACE/.* || true

      # =========================
      # CHECKOUT REPO (BUTUH UNTUK WORKFLOW)
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # NODE.JS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # =========================
      # DOWNLOAD ZIP
      # =========================
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          # Coba dengan User-Agent dan tanpa Auth dulu (untuk public URL)
          curl -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip

          echo ""
          echo "=== File Type ==="
          file project.zip

      # =========================
      # VALIDASI & EKSTRAK ZIP
      # =========================
      - name: Validate and Extract ZIP
        run: |
          echo "=== Validating ZIP ==="

          if ! file project.zip | grep -q "Zip archive"; then
            echo "❌ File bukan ZIP valid!"
            echo ""
            echo "=== Isi file (first 200 chars) ==="
            head -c 200 project.zip
            echo ""
            exit 1
          fi

          echo "✅ ZIP valid"

          echo ""
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo ""
          echo "=== Isi folder project_raw ==="
          ls -la project_raw/

          echo ""
          echo "=== Detecting Project Root ==="
          
          # Cek apakah ada subfolder tunggal di root zip
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
            echo "✅ Single root folder detected: $PROJECT_DIR"
          else
            PROJECT_DIR="project_raw"
            echo "✅ Multiple files/folders at root, using project_raw"
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

          echo ""
          echo "=== Project structure ==="
          ls -la $PROJECT_DIR/

      # =========================
      # JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # FLUTTER
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"
          cache: true

      # ==========================================================
      # 🔍 TAHAP ANALYZE
      # ==========================================================
      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Starting Automated Code Analysis ==="

          if [ -f "pubspec.yaml" ]; then
            echo "🔍 Menjalankan flutter analyze..."
            
            flutter pub get
            flutter analyze || true
            
          else
            echo "☕ Project native / gradlew terdeteksi!"
            echo "⚠️ Fitur analyze hanya support project Flutter (pubspec.yaml tidak ditemukan)."
          fi

      # ==========================================================
      # 🔍 STOP JIKA ONLY_ANALYZE = TRUE
      # ==========================================================
      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: |
          echo "✅ Analyze-only mode selesai. Workflow dihentikan."
          exit 0

      # =========================
      # FLUTTER DOCTOR (INFO)
      # =========================
      - name: Flutter Doctor
        run: flutter doctor

      # ==========================================================
      # 📦 TAHAP DOWNLOAD DEPENDENSI
      # ==========================================================
      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Running flutter pub get ==="
          if [ -f "pubspec.yaml" ]; then
            flutter pub get
          else
            echo "☕ Bukan project Flutter standar, skip pub get!"
          fi

      # ==========================================================
      # 🚀 TAHAP BUILD APK
      # ==========================================================
      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK ==="
          echo "Mode: ${{ github.event.inputs.build_type }}"

          if [ -f "pubspec.yaml" ]; then
            echo "🔥 Project Flutter Terdeteksi!"
            flutter build apk --${{ github.event.inputs.build_type }} --no-tree-shake-icons
            
          else
            echo "☕ Project Native Android Terdeteksi!"
            GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
            
            if [ -z "$GRADLE_PATH" ]; then
              echo "❌ ERROR: File 'gradlew' tidak ditemukan!"
              exit 1
            fi
            
            GRADLE_DIR=$(dirname "$GRADLE_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew
            
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug
            else
              ./gradlew assembleRelease
            fi
            cd -
          fi

      # =========================
      # FIND APK & SET PATH
      # =========================
      - name: Find APK
        id: find_apk
        run: |
          echo "=== Scanning for APK files ==="
          
          # Cari APK di folder build
          APK_PATH=$(find ${{ env.PROJECT_DIR }} -name "*.apk" -type f | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found!"
            exit 1
          fi
          
          echo "✅ APK found: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          
          echo "=== APK Info ==="
          ls -lh "$APK_PATH"
          file "$APK_PATH"

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.APK_PATH }}
          retention-days: 7
          if-no-files-found: error

      # =========================
      # UPLOAD KE RELEASE (OPSIONAL)
      # =========================
      - name: Upload APK to Release
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ env.APK_PATH }}
          asset_name: app-release-${{ github.event.inputs.tag }}.apk
          asset_content_type: application/vnd.android.package-archive
