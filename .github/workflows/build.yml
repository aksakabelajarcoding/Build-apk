name: Flutter Build

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP project Flutter'
        required: true
      tag:
        description: 'Tag release'
        required: true
      build_type:
        description: 'Tipe build (release/debug)'
        required: false
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Download Project ZIP
        run: |
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          unzip project.zip -d project/
          ls -la project/

      - name: Build APK
        run: |
          cd project/
          flutter pub get
          flutter build apk --release

      - name: Verify APK
        run: |
          if [ ! -f "project/build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "❌ APK tidak ditemukan!"
            exit 1
          fi
          echo "✅ APK berhasil dibuat!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-apk
          path: project/build/app/outputs/flutter-apk/app-release.apk
