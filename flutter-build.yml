name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        required: true
        type: string
      tag:
        required: true
        type: string
      build_type:
        required: false
        default: release
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Download Source
        run: |
          wget "${{ github.event.inputs.zip_url }}" -O source.zip

      - name: Extract
        run: |
          unzip -o source.zip -d project

      - name: Find Flutter Project
        run: |
          cd project
          if [ -f pubspec.yaml ]; then
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          else
            DIR=$(find . -name pubspec.yaml | head -n1 | xargs dirname)
            echo "PROJECT_DIR=$DIR" >> $GITHUB_ENV
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Get Packages
        working-directory: project/${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Build APK
        working-directory: project/${{ env.PROJECT_DIR }}
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: project/${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/*.apk
